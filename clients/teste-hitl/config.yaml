client_id: "teste-hitl"

agent:
  name: "Agente Teste HITL"
  model: "openai/gpt-4.1-mini"

# --- LLM ---
# Conexão via Bifrost (gateway local que roteia pros providers)
# Se não tem Bifrost, ver documentação para conexão direta
llm:
  gateway_url: "http://localhost:8080/v1"
  api_key: "dummy"                  # Bifrost não precisa de key real
  timeout_seconds: 60               # Timeout do modelo primário
  fallback_timeout_seconds: 120     # DeepSeek precisa de mais tempo


# --- Human-in-the-loop ---
# Quando o agente não sabe responder, escalona pro responsável
human:
  enabled: true
  responsible_phones: ["5534998009277"]
  escalation_session_ttl: 7200      # 2h pra responder

# --- Guardrails ---
# Regras que o agente avalia ANTES de chamar o LLM (custo zero)
guardrails:
  input_patterns:
    - name: "cancelamento"
      keywords: ["cancelar", "quero cancelar", "cancela"]
      action: "escalate"
      priority: 20

    - name: "reclamacao_grave"
      keywords: ["procon", "processo", "advogado"]
      action: "escalate_no_habit"
      priority: 30

    - name: "fora_de_escopo"
      keywords: ["futebol", "previsao do tempo", "politica"]
      action: "redirect"
      redirect_message: "Sou o agente de teste do framework Zuper! Só consigo ajudar com assuntos do negócio."
      priority: 10

# --- Messaging ---
messaging:
  disclaimer:
    enabled: true
    text: "Agente de teste HITL — Zuper Framework"

# --- Features desligadas pro teste ---
habits:
  enabled: false          # liga depois de testar escalation isolado

follow_up:
  enabled: false

media:
  enabled: false

queue:
  enabled: false