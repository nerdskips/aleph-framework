# --- Media (DEFAULT OFF) ------------------------------------------------------
# media:
#   enabled: true
#   supported_types: ["audio", "image", "pdf"]

# --- Queue (DEFAULT OFF) ------------------------------------------------------
# queue:
#   enabled: true

# --- Messaging (ALWAYS ON — using all defaults) --------------------------------
messaging:
  disclaimer:
    text: "Echo Bot — Zuper Agent Framework test"

# --- Tools --------------------------------------------------------------------
# Two modes: 'code' (Python) and 'webhook' (N8N/HTTP, zero code)
tools:
  # Code tool — Python module in tools/ folder
 #  - name: "echo_message"
 #    type: "code"
 #    module: "echo_tools"
  - name: "buscar_cep"
    type: "webhook"
    description: "Busca endereço por CEP"
    webhook_url: "https://viacep.com.br/ws/{cep}/json/"
    method: "GET"
    parameters:
      cep:
        type: "string"
        description: "CEP para buscar (só números)"

  # Webhook tool example (uncomment to test with N8N):
  # - name: "consultar_dados"
  #   type: "webhook"
  #   description: "Consulta dados do cliente"
  #   webhook_url: "http://n8n:5678/webhook/dados"
  #   parameters:
  #     acao:
  #       type: "string"
  #       default: "consultar"
  #       hidden: true
  #     phone:
  #       type: "string"
  #       description: "Telefone do cliente"

# --- Data files (none for echo bot) -------------------------------------------
data_files: []

