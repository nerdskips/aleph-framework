# =============================================================================
# Zuper Agent Framework — Example Agent Config
# =============================================================================
# MINIMUM config to boot an agent.
# Everything not listed here uses production-validated defaults.
#
# Default tiers:
#   ALWAYS ON:  session, messaging, llm, api, debug, text normalization
#   DEFAULT ON: human, guardrails, sdk.sessions, sdk.guardrails, disclaimer
#   DEFAULT OFF: habits, follow_up, media, queue, sdk.handoffs, dry_run
# =============================================================================

client_id: "example"

# --- Agent identity (only 'name' is required) --------------------------------
agent:
  name: "Echo Bot"
  description: "Test agent for framework validation"
  model: "openai/gpt-4.1-mini"
  system_prompt_file: "prompts/system.md"

# --- SDK 0.12 native features ------------------------------------------------
# sdk.sessions: ON by default (Redis conversation history)
# sdk.guardrails: ON by default (tripwire system in parallel with LLM)
# sdk.handoffs: OFF by default (single-agent for now)
# Episodic memory fields (Phase 12 — uncomment to customize):
#   sessions:
#     max_raw_turns: 8            # rolling turn window; compression fires when full
#     compression_model: ""       # empty = fallback_model → agent.model
#     gap_compression_hours: 3.0  # deep compress when user returns after N hours
#     summary_ttl_days: 30        # days to retain episodic summary

# --- Debug & Observability (ON by default — full auditability) ----------------
# Uncomment to customize:
# debug:
#   tracing:
#     enabled: true
#     export_to: "console"       # or "braintrust", "opentelemetry"
#     sample_rate: 1.0           # trace everything
#   logging:
#     level: "INFO"              # DEBUG for development
#     format: "json"             # structured logs
#   verbose_errors: true         # stack traces in dev
#   dry_run: false               # true = don't send messages (testing)

# --- API server ---------------------------------------------------------------
api:
  port: 8000

# --- Human-in-the-loop (DEFAULT ON but disabled for echo bot) -----------------
human:
  enabled: false

# --- Habits (DEFAULT OFF) -----------------------------------------------------
